name: Build DarkGram+

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep "^Xcode_1[6-9]" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications | grep "^Xcode" | sort -V | tail -1)
          fi
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Show scheme info
        run: |
          xcodebuild -project DarkGram.xcodeproj -list

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project DarkGram.xcodeproj \
            -scheme DarkGram \
            -configuration Release \
            -archivePath $RUNNER_TEMP/DarkGram.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.selfcode.darkgramplus \
            2>&1 | tee /tmp/build.log
          echo "Exit: $?"
          ls -la $RUNNER_TEMP/ || true

      - name: Export IPA
        run: |
          set -e
          ls -la $RUNNER_TEMP/
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/DarkGram.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist \
            2>&1
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "IPA: $IPA"
          cp "$IPA" $RUNNER_TEMP/DarkGram.ipa

      - name: Inject icons into IPA
        run: |
          cd $RUNNER_TEMP
          mkdir -p ipa_patch
          unzip -q DarkGram.ipa -d ipa_patch
          APP=$(find ipa_patch/Payload -name "*.app" | head -1)
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-60@2x.png   "$APP/AppIcon60x60@2x.png"
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-60@3x.png   "$APP/AppIcon60x60@3x.png"
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-76@2x.png   "$APP/AppIcon76x76@2x.png"
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-83.5@2x.png "$APP/AppIcon83.5x83.5@2x.png"
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-1024@1x.png "$APP/AppIcon1024x1024@1x.png"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles: string AppIcon60x60" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles: string AppIcon76x76" "$APP/Info.plist"
          cp $GITHUB_WORKSPACE/DarkGram/Assets.xcassets/AppIcon.appiconset/Icon-1024@1x.png ipa_patch/iTunesArtwork
          cd ipa_patch && zip -qr ../DarkGram-final.ipa . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          name: DarkGram+ v${{ github.event.inputs.version || '1.0.0' }}
          prerelease: true
          files: ${{ runner.temp }}/DarkGram-final.ipa
          body: |
            ## DarkGram+ v${{ github.event.inputs.version || '1.0.0' }}
            Установка через Sideloadly / AltStore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
